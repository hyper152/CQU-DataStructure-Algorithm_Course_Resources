<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据结构与算法 · 选择题练习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    padding: 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 28px;
    margin: 20px 0 6px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* Topic filter */
  .topic-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .topic-btn {
    padding: 6px 14px;
    border: 1px solid #d0d5dd;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    background: #fff;
    color: #444;
    transition: .15s;
  }
  .topic-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .topic-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .topic-btn.all-btn { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

  /* Question card */
  .q-card {
    background: #fff;
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    transition: .2s;
    border-left: 4px solid transparent;
  }
  .q-card.correct { border-left-color: #10b981; }
  .q-card.wrong { border-left-color: #ef4444; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .q-topic {
    font-size: 13px;
    font-weight: 600;
    background: #eef2ff;
    color: #4f46e5;
    padding: 3px 12px;
    border-radius: 10px;
  }
  .q-week {
    font-size: 13px;
    font-weight: 600;
    background: #f0fdf4;
    color: #15803d;
    padding: 3px 12px;
    border-radius: 10px;
  }
  .q-num {
    font-size: 13px;
    color: #1a1a2e;
    font-weight: 600;
  }
  .q-type {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 500;
  }
  .q-type.judge { background: #fef3c7; color: #b45309; }
  .q-type.choice { background: #dbeafe; color: #1d4ed8; }
  .q-status {
    margin-left: auto;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 8px;
  }
  .q-status.untouched { background: #f3f4f6; color: #9ca3af; }
  .q-status.correct { background: #d1fae5; color: #065f46; }
  .q-status.wrong { background: #fee2e2; color: #991b1b; }

  .q-text {
    font-size: 18px;
    line-height: 1.8;
    margin-bottom: 16px;
    font-weight: 500;
    color: #1a1a2e;
  }
  .q-text .code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 16px;
    background: #f3f4f6;
    padding: 10px 14px;
    border-radius: 8px;
    display: block;
    white-space: pre;
    overflow-x: auto;
    margin: 8px 0;
    font-weight: 400;
    line-height: 1.5;
  }

  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .option {
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    cursor: pointer;
    font-size: 17px;
    background: #fafafa;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .option:hover:not(.disabled) { border-color: #818cf8; background: #f5f3ff; }
  .option .label {
    font-weight: 600;
    color: #4f46e5;
    min-width: 22px;
  }
  .option.disabled { cursor: default; opacity: .85; }
  .option.selected:not(.reveal) { border-color: #4f46e5; background: #eef2ff; }
  .option.correct-answer { border-color: #10b981 !important; background: #d1fae5 !important; }
  .option.wrong-answer { border-color: #ef4444 !important; background: #fee2e2 !important; }

  /* Explanation */
  .explanation {
    margin-top: 12px;
    padding: 16px 18px;
    border-radius: 10px;
    font-size: 16px;
    line-height: 1.8;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation.correct { background: #ecfdf5; border-left: 4px solid #10b981; }
  .explanation.wrong { background: #fef2f2; border-left: 4px solid #ef4444; }
  .explanation .ans-label {
    font-weight: 700;
    display: inline-block;
    margin-bottom: 4px;
  }
  .explanation .ans-label.correct-label { color: #065f46; }
  .explanation .ans-label.wrong-label { color: #991b1b; }

  /* Stats */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 14px 20px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
  }
  .stat-label {
    font-size: 12px;
    color: #999;
  }
  .stat-num.green { color: #10b981; }
  .stat-num.red { color: #ef4444; }
  .stat-num.gray { color: #9ca3af; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .q-card { padding: 16px 18px; }
    .topic-bar { gap: 6px; padding: 8px; }
    .topic-btn { font-size: 12px; padding: 4px 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📚 数据结构与算法</h1>
  <p class="subtitle">选择题练习 · 点击选项查看答案与解析</p>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-num gray" id="totalQ">0</div><div class="stat-label">总题数</div></div>
    <div class="stat-item"><div class="stat-num green" id="correctCount">0</div><div class="stat-label">正确</div></div>
    <div class="stat-item"><div class="stat-num red" id="wrongCount">0</div><div class="stat-label">错误</div></div>
    <div class="stat-item"><div class="stat-num gray" id="accuracy">0%</div><div class="stat-label">正确率</div></div>
  </div>

  <div class="topic-bar" id="topicBar"></div>
  <div id="questionList"></div>
</div>

<script>
// ========================
//  Question Data
// ========================
const QUESTIONS = [
  // ===== 第1周：算法复杂度 & 逻辑结构 =====
  {
    id: 'q1', topic: '算法复杂度', type: 'judge',
    text: '最好情况复杂度是在最理想的情况下，算法所能达到的最高效率。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。最好情况复杂度（Best-case Complexity）是指在最理想的输入情况下，算法的基本操作执行次数最少时的效率。'
  },
  {
    id: 'q2', topic: '算法复杂度', type: 'judge',
    text: '最坏情况复杂度是算法可能遇到的最糟糕的情况的效率。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。最坏情况复杂度（Worst-case Complexity）是指在最差的输入情况下，算法的基本操作执行次数最多时的效率。'
  },
  {
    id: 'q3', topic: '算法复杂度', type: 'judge',
    text: '度量算法的时间复杂度可以通过分析算法的基本操作执行次数来实现。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。时间复杂度的度量通常通过分析基本操作（如赋值、比较等）的执行次数与问题规模 n 的关系来确定。'
  },
  {
    id: 'q4', topic: '逻辑结构', type: 'judge',
    text: '超市收银台排队等候结账的顾客之间具有一对一的逻辑关系。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。排队等候结账的顾客形成一个队列结构，属于线性结构（一对一关系），每个元素有唯一的前驱和后继。'
  },
  {
    id: 'q5', topic: '逻辑结构', type: 'judge',
    text: '游乐园里的游客之间具有一对一的逻辑关系。',
    options: ['正确', '错误'],
    answer: 1,
    explanation: '错误。游乐园里游客之间没有固定的线性关系，可自由交互，属于图形结构（多对多关系）。'
  },
  {
    id: 'q6', topic: '逻辑结构', type: 'judge',
    text: '电脑里的文件夹与文件之间具有一对多的逻辑关系。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。一个文件夹可以包含多个文件或子文件夹，形成树形结构的一对多关系。'
  },

  // ===== 第2周：线性表 =====
  {
    id: 'q7', topic: '线性表-顺序', type: 'judge',
    text: '线性表存储于 A[1..50] 中，删除第 30 个元素，需要移动 20 个元素。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。A[1..50] 共 50 个元素，删除第 30 个元素后，第 31～50 这 20 个元素需要向前移动一个位置。'
  },
  {
    id: 'q8', topic: '线性表-顺序', type: 'judge',
    text: '线性表 L 如果需要频繁地进行不同下标元素的插入、删除操作，此时选择顺序存储结构更好。',
    options: ['正确', '错误'],
    answer: 1,
    explanation: '错误。频繁插入/删除应选择链式存储结构，因为顺序表插入/删除需要移动大量元素，时间复杂度 O(n)；而链表只需修改指针，时间复杂度 O(1)（已知位置时）。'
  },
  {
    id: 'q9', topic: '线性表-顺序', type: 'judge',
    text: '在长度为 N 的顺序表中查找第 k 个元素，平均时间复杂度是 O(N)。',
    options: ['正确', '错误'],
    answer: 1,
    explanation: '错误。顺序表支持随机存取，可通过下标直接访问第 k 个元素，时间复杂度为 O(1)，不是 O(N)。'
  },
  {
    id: 'q10', topic: '线性表-顺序', type: 'judge',
    text: '在长度为 N 的顺序表中查找最大元素，平均时间复杂度是 O(N)。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。查找最大元素需要遍历整个顺序表进行比较，因此时间复杂度为 O(N)。'
  },
  {
    id: 'q11', topic: '算法复杂度', type: 'judge',
    text: 'Given two algorithms A₁ and A₂, with time complexities T₁ = O(n²) and T₂ = O(n log n). Then A₂ must be faster than A₁.',
    options: ['正确', '错误'],
    answer: 1,
    explanation: '错误。大 O 表示法给出的是上界，不是实际运行时间。当 n 较小时，O(n²) 的算法可能比 O(n log n) 更快；且大 O 忽略了常数因子和低阶项。实际上 O(n²) 的增长速度确实更快，但 "must be faster" 过于绝对。'
  },
  {
    id: 'q12', topic: '算法复杂度', type: 'choice',
    text: '下列代码的时间复杂度是：\n<code>int sum = 0;\nfor(int i = 1; i < n; i *= 2)\n    for(int j = 0; j < i; j++)\n        sum++;</code>',
    options: ['O(log n)', 'O(n)', 'O(n log n)', 'O(n²)'],
    answer: 1,
    explanation: '正确答案为 O(n)。外层循环 i 取值为 1, 2, 4, 8, ..., 2^k（直到 < n），共 log n 趟。内层循环 j 从 0 到 i-1，因此总执行次数为 1 + 2 + 4 + ... + 2^k ≈ 2n，即 O(n)。'
  },
  {
    id: 'q13', topic: '算法复杂度', type: 'choice',
    text: '根据 Hanoi 塔算法，把 n (n > 10) 个盘子从 A 柱经过 B 柱移到 C 柱的移动次数为 2ⁿ − 1，其中最小的盘子共移动 2ⁿ⁻¹ 次，最大的盘子只移动了 1 次。假设预先把最小或最大的盘子从 A 柱上去掉，那么移动剩下的盘子的总次数分别是：',
    options: [
      '2ⁿ⁻¹ 和 2ⁿ − 2',
      '2ⁿ⁻¹ − 1 和 2ⁿ − 2',
      '2ⁿ⁻¹ − 1 和 2ⁿ⁻¹ − 1',
      '2ⁿ⁻¹ 和 2ⁿ⁻¹ + n'
    ],
    answer: 1,
    explanation: '正确答案为 B。去掉最小盘子：原移动次数 2ⁿ−1，最小盘子移动 2ⁿ⁻¹ 次，剩余 2ⁿ−1−2ⁿ⁻¹ = 2ⁿ⁻¹−1。去掉最大盘子：最大盘子只移动 1 次，去掉它就相当于少了一次最大盘子的移动，所以盘子的移动变成 n−1 个盘子的 Hanoi 问题，即 2ⁿ⁻¹−1 次。但注意最大盘子所在位置的特殊性，正确答案是 2ⁿ⁻¹−1 和 2ⁿ−2。'
  },
  {
    id: 'q14', topic: '算法复杂度', type: 'choice',
    text: '下列代码的时间复杂度是：\n<code>for(i = M; i > 0; i--)\n    sum += i;\nfor(j = 1; j <= N; j++)\n    for(k = N; k >= 1; k /= 2)\n        sum += k;</code>',
    options: [
      'O(M)',
      'O(N × log₂N)',
      'O(M + N × log₂N)',
      'O(M × log₂M)',
      'O(N²)',
      'O(M² + N²)',
      'O(M + N²)',
      'O(M + M×N)',
      'O(M × N × log₂N)'
    ],
    answer: 2,
    explanation: '正确答案为 O(M + N × log₂N)。第一个循环为 O(M)；第二个嵌套循环中，外层执行 N 次，内层 k 从 N 每次除以 2，执行 log₂N 次，因此为 O(N × log₂N)。两者串联，总复杂度相加。'
  },
  {
    id: 'q15', topic: '线性表-顺序', type: 'choice',
    text: '（  ）不能让数组 a[4] 的每个元素都获得初值 12。',
    options: [
      'int a[4] = {4*12};',
      'int a[4] = {12,12,12,12};',
      'int a[4], i; for(i=0;i<4;i++) a[i]=12;',
      'int a[4]; a[0]=a[1]=a[2]=a[3]=12;'
    ],
    answer: 0,
    explanation: 'A 选项：int a[4] = {4*12} 只初始化了 a[0] = 48，其余三个元素默认初始化为 0，不能使每个元素都获得初值 12。B 选项显式初始化了所有元素；C 选项通过循环赋值；D 选项逐个赋值。'
  },
  {
    id: 'q16', topic: '线性表-顺序', type: 'choice',
    text: '线性表有元素 50 个，存储在数组 A[1..100] 中，在第 25 个元素之后插入一个元素，需要移动元素（  ）个。',
    options: ['24', '25', '26', '75'],
    answer: 1,
    explanation: '正确答案为 25。第 25 个元素位于 A[25]，在其之后（即 A[26] 位置）插入，需要将原第 26～50 这 25 个元素依次后移。注意："在第 25 个元素之后插入" 是指插入位置为第 25 个元素之后（即第 26 个位置）。'
  },
  {
    id: 'q17', topic: '线性表-顺序', type: 'choice',
    text: '在长度为 n 的顺序表任意位置插入元素，平均需要移动（  ）个元素。',
    options: ['n', 'n/2', 'n+1', '2×n'],
    answer: 1,
    explanation: '正确答案为 n/2。在长度为 n 的顺序表中，插入到第 i 个位置需要移动 n−i+1 个元素。每个位置等概率插入时，平均移动次数为 (n+1)/2 的近似值可理解为 n/2。'
  },

  // ===== 第3周：栈 =====
  {
    id: 'q18', topic: '栈', type: 'judge',
    text: '链栈和顺序栈相比，比较明显的优点是通常不会出现栈满的情况。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。链栈采用动态分配，结点通过指针链接，只要内存足够就不会出现栈满；而顺序栈使用固定大小的数组，可能会溢出。'
  },
  {
    id: 'q19', topic: '栈', type: 'judge',
    text: '堆栈适合解决处理顺序与输入顺序相同的问题。',
    options: ['正确', '错误'],
    answer: 1,
    explanation: '错误。栈是后进先出（LIFO）结构，即处理顺序与输入顺序相反。适合解决逆序处理问题（如括号匹配、表达式求值、函数调用等），而非顺序相同的问题。顺序相同应使用队列。'
  },
  {
    id: 'q20', topic: '栈', type: 'judge',
    text: '两个栈共享一片连续空间，可以将两个栈的栈底分别设在这片空间的两端。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。这种两栈共享空间的方案，让两个栈分别从数组两端向中间增长，可以有效利用空间，降低发生栈满的概率。'
  },
  {
    id: 'q21', topic: '栈', type: 'judge',
    text: '栈是一种特殊的线性表，它的插入和删除操作都是在表的同一端进行。',
    options: ['正确', '错误'],
    answer: 0,
    explanation: '正确。栈是限定只在表尾（栈顶）进行插入和删除操作的线性表，即 LIFO（后进先出）结构。'
  },
  {
    id: 'q22', topic: '栈', type: 'choice',
    text: '一个顺序栈定义如下：\n<code>struct Stack {\n    int *data;    // 栈元素数组\n    int top;      // top 下标\n    int capacity; // 栈容量\n} st;</code>\n栈底设在数组下标小的一端，top 指向栈顶元素上方相邻位置，判断栈满的条件是：',
    options: ['st.top == -1', 'st.top == 0', 'st.top == st.capacity - 1', 'st.top == st.capacity'],
    answer: 3,
    explanation: '正确答案为 st.top == st.capacity。top 指向栈顶元素的上方位置，栈为空时 top=0，每入栈一个元素先赋值再 top++。栈满时 top 已经指向了数组最后一个位置的下一个位置，即 top == capacity。'
  },
  {
    id: 'q23', topic: '栈', type: 'choice',
    text: '若元素 1、2、3、4、5 依次入栈，则出栈次序可能为 ▁▁▁▁▁ 。',
    options: ['4, 1, 3, 2, 5', '5, 1, 3, 2, 4', '1, 2, 5, 4, 3', '3, 1, 5, 4, 2'],
    answer: 2,
    explanation: '1 入→出, 2 入→出, 3 入→4入→5入→5出→4出→3出，得到 1,2,5,4,3。A 选项 4,1,... 不可能（1 在 2 下面不可能比 2 先出）；B 选项 5,1,... 不可能（1 被 2,3,4 压着）；D 选项 3,1,... 不可能（1 被 2 压着）。'
  },
  {
    id: 'q24', topic: '栈', type: 'choice',
    text: '若元素 1、2、3、4、5 依次入栈，则出栈次序不可能为 ▁▁▁▁▁ 。',
    options: ['2, 4, 3, 1, 5', '3, 5, 2, 4, 1', '1, 2, 4, 3, 5', '5, 4, 3, 2, 1'],
    answer: 1,
    explanation: 'B 选项 3,5,2,4,1 不可能。分析：3 出栈时栈内为 [1,2]，然后入栈 4、5 后出 5，此时栈内为 [1,2,4]；5 之后如果要出 2，但 2 被 4 压着，必须先出 4 才能出 2，因此 5 之后立即出 2 是不可能的。'
  },

let correctCount = 0, wrongCount = 0, answeredCount = 0;

function render() {

function renderQuestions(topic) {
  const list = document.getElementById('questionList');
  const filtered = topic === 'all' ? allQuestions : allQuestions.filter(q => q.topic === topic);

  list.innerHTML = filtered.map(q => {
    const labels = q.type === 'judge' ? ['T', 'F'] : ['A', 'B', 'C', 'D'];
    return `
    <div class="q-card" id="card-${q.id}">
      <div class="q-header">
        <span class="q-num">${labelMap[q.id]}.</span>
        ${weekMap[q.id] ? `<span class="q-week">${weekMap[q.id]}</span>` : ''}
        <span class="q-topic">${q.topic}</span>
        <span class="q-type ${q.type}">${q.type === 'judge' ? '判断题' : '选择题'}</span>
        <span class="q-status untouched" id="status-${q.id}">未作答</span>
      </div>
      <div class="q-text">${q.text.replace(/\n/g, '<br>').replace(/<code>([\s\S]*?)<\/code>/g, '<span class="code">$1</span>')}</div>
      <div class="options" id="opts-${q.id}">
        ${q.options.map((opt, i) => `
          <div class="option" data-qid="${q.id}" data-idx="${i}" onclick="selectOption('${q.id}', ${i})">
            <span class="label">${labels[i]}.</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="explanation" id="expl-${q.id}"></div>
    </div>`;
  }).join('');
}

// Selection state
const state = {};

function selectOption(qid, idx) {
  if (state[qid]?.locked) return;

  const q = allQuestions.find(x => x.id === qid);
  if (!q) return;

  const isCorrect = idx === q.answer;
  const labels = q.type === 'judge' ? ['T', 'F'] : ['A', 'B', 'C', 'D'];

  // Lock
  if (!state[qid]) state[qid] = {};
  state[qid].locked = true;
  state[qid].selected = idx;

  // Update stats
  if (!state[qid]?.counted) {
    answeredCount++;
    if (isCorrect) correctCount++;
    else wrongCount++;
    state[qid].counted = true;
  }

  // Update card
  const card = document.getElementById(`card-${qid}`);
  card.className = `q-card ${isCorrect ? 'correct' : 'wrong'}`;

  // Update options
  const opts = document.querySelectorAll(`#opts-${qid} .option`);
  opts.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.answer) opt.classList.add('correct-answer');
    else if (i === idx && !isCorrect) opt.classList.add('wrong-answer');
    else opt.classList.add('selected');
  });

  // Update status
  const status = document.getElementById(`status-${qid}`);
  status.className = `q-status ${isCorrect ? 'correct' : 'wrong'}`;
  status.textContent = isCorrect ? '✓ 正确' : '✗ 错误';

  // Show explanation
  const expl = document.getElementById(`expl-${qid}`);
  expl.className = `explanation show ${isCorrect ? 'correct' : 'wrong'}`;
  const label = isCorrect ? '✅ 答案正确！' : '❌ 答案错误';
  expl.innerHTML = `<div class="ans-label ${isCorrect ? 'correct-label' : 'wrong-label'}">${label}</div>
    <div style="margin-top:4px">正确答案：<strong>${labels[q.answer]}</strong></div>
    <div style="margin-top:8px">💡 ${q.explanation}</div>`;

  // Update stats bar
  updateStats();
}

function updateStats() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('accuracy').textContent =
    answeredCount === 0 ? '0%' : Math.round(correctCount / answeredCount * 100) + '%';
}

// Topic filter
function filterTopic(topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderQuestions(topic);
}

// Init
render();
updateStats();
